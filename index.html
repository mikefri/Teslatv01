<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TeslaTV</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #151b2b;
            --bg-tertiary: #1e2738;
            --accent: #00d9ff;
            --text-primary: #ffffff;
            --text-secondary: #8b93a7;
            --border: rgba(255,255,255,0.1);
            --shadow: rgba(0,0,0,0.5);
            --fav-gold: #ffb700;
            --rec-red: #ff3b3b;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin:0; padding:0; box-sizing:border-box; outline:none; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; }
        body {
            font-family:'Inter',sans-serif;
            background:var(--bg-primary);
            color:var(--text-primary);
            height:100dvh;
        }

        /* ═══════════════════════════════════════
           SIDEBAR TOGGLE
        ═══════════════════════════════════════ */
        .sidebar-toggle {
            position:fixed; left:0; top:50%; transform:translateY(-50%);
            width:44px; height:100px;
            background:var(--bg-tertiary);
            border:1px solid var(--border); border-left:none;
            border-radius:0 14px 14px 0;
            cursor:pointer; z-index:1001;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.3s; box-shadow:4px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar-toggle:hover,
        .sidebar-toggle:active { background:var(--accent); color:#000; width:52px; }
        .sidebar-toggle.open { left:min(85vw, 400px); }
        .sidebar-toggle svg { width:22px; fill:currentColor; }

        /* ═══════════════════════════════════════
           SIDEBAR
        ═══════════════════════════════════════ */
        .sidebar {
            position:fixed; left:min(-85vw,-400px); top:0;
            width:min(85vw, 400px); height:100dvh;
            background:var(--bg-secondary);
            border-right:1px solid var(--border);
            z-index:1000; transition:left 0.3s cubic-bezier(.4,0,.2,1);
            display:flex; flex-direction:column;
            padding-top:var(--safe-top);
        }
        .sidebar.open { left:0; }

        .sidebar-header {
            padding:1.2rem 1.2rem 1rem;
            background:var(--bg-tertiary);
            border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        .sidebar-title {
            font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:800;
            cursor:pointer; user-select:none;
            background:linear-gradient(90deg,#fff,var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .mode-switcher { display:flex; gap:6px; margin-top:0.9rem; }
        .mode-btn {
            flex:1; padding:9px 6px;
            background:rgba(255,255,255,0.05);
            border:none; color:var(--text-secondary);
            border-radius:8px; cursor:pointer;
            font-weight:600; font-size:0.85rem;
            transition:0.2s; touch-action:manipulation;
            min-height:40px;
        }
        .mode-btn.active { background:var(--accent); color:#000; }

        .search-container { padding:0.9rem 1rem 0.6rem; flex-shrink:0; }
        .search-box {
            width:100%; padding:11px 14px;
            background:var(--bg-primary);
            border:1px solid var(--border);
            border-radius:12px; color:white; font-size:1rem;
            font-family:'Inter',sans-serif;
        }
        .search-box::placeholder { color:var(--text-secondary); }

        .channels-grid {
            flex:1; overflow-y:auto; padding:0 0.8rem;
            padding-bottom:calc(1rem + var(--safe-bottom));
            -webkit-overflow-scrolling:touch;
            overscroll-behavior:contain;
        }
        .channel-card {
            display:flex; align-items:center; gap:0.9rem;
            padding:11px 12px;
            background:var(--bg-primary);
            border:1px solid var(--border);
            border-radius:12px; margin-bottom:7px;
            cursor:pointer; transition:all 0.15s;
            touch-action:manipulation;
            min-height:60px;
        }
        .channel-card:active { transform:scale(0.98); border-color:var(--accent); background:var(--bg-tertiary); }
        .channel-card.active { border-color:var(--accent); background:linear-gradient(90deg,rgba(0,217,255,0.1),transparent); }
        .channel-logo {
            width:38px; height:38px; object-fit:contain;
            background:rgba(255,255,255,0.08);
            border-radius:8px; padding:4px; flex-shrink:0;
        }
        .channel-name {
            font-weight:600; font-size:0.9rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .channel-cat { font-size:0.75rem; color:var(--text-secondary); margin-top:2px; }

        /* ═══════════════════════════════════════
           MAIN CONTENT
        ═══════════════════════════════════════ */
        .main-content {
            height:100dvh;
            transition:margin-left 0.3s cubic-bezier(.4,0,.2,1);
            display:flex; flex-direction:column;
            padding-top:var(--safe-top);
            padding-bottom:var(--safe-bottom);
        }
        .main-content.shifted { margin-left:min(85vw,400px); }

        /* ═══════════════════════════════════════
           PLAYER FRAME
        ═══════════════════════════════════════ */
        .player-frame {
            flex:1; display:flex; flex-direction:column;
            background:var(--bg-secondary);
            overflow:hidden;
        }

        /* ── HEADER DESKTOP ── */
        .player-header {
            padding:0.75rem 1.5rem;
            background:linear-gradient(180deg,var(--bg-tertiary),var(--bg-secondary));
            border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            flex-shrink:0; gap:0.5rem;
        }
        .header-info { display:flex; align-items:center; gap:0.75rem; min-width:0; flex:1; }
        .header-info-text { min-width:0; }
        .header-title { font-size:1.1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .header-cat { font-size:0.75rem; color:var(--text-secondary); }
        #currentLogo { height:28px; flex-shrink:0; }

        /* ── HORLOGE ── */
        .clock-display {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:0 1rem;
            border-left:1px solid var(--border);
            border-right:1px solid var(--border);
            min-width:110px; height:44px; gap:1px;
            flex-shrink:0;
        }
        .clock-time {
            font-family:'Syne',sans-serif; font-size:1.15rem; font-weight:700;
            color:var(--text-primary); letter-spacing:0.06em;
            font-variant-numeric:tabular-nums; line-height:1;
        }
        .clock-date {
            font-size:0.62rem; color:var(--text-secondary);
            letter-spacing:0.04em; text-transform:capitalize; line-height:1;
        }

        /* ── CONTROLS ── */
        .header-controls { display:flex; gap:0.4rem; align-items:center; flex-shrink:0; }
        .ctrl-btn {
            width:38px; height:38px; border-radius:10px;
            border:1px solid var(--border);
            background:var(--bg-primary); color:var(--text-secondary);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:0.2s; touch-action:manipulation; flex-shrink:0;
        }
        .ctrl-btn:hover, .ctrl-btn:active { background:var(--accent); color:#000; border-color:var(--accent); }
        .ctrl-btn svg { width:18px; height:18px; fill:currentColor; }

        .rec-btn {
            width:38px; height:38px; border-radius:10px;
            border:1px solid var(--border);
            background:var(--bg-primary); color:var(--text-secondary);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:0.2s; touch-action:manipulation;
        }
        .rec-btn:hover, .rec-btn:active { background:rgba(255,59,59,0.15); border-color:var(--rec-red); color:var(--rec-red); }
        .rec-btn.recording { background:var(--rec-red); border-color:var(--rec-red); color:#fff; animation:recPulse 1.2s ease-in-out infinite; }
        .rec-btn svg { width:18px; height:18px; fill:currentColor; }
        @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,59,59,0.6)} 50%{box-shadow:0 0 0 8px rgba(255,59,59,0)} }

        .rec-timer {
            font-size:0.72rem; font-weight:700; color:var(--rec-red);
            background:rgba(255,59,59,0.12); border:1px solid rgba(255,59,59,0.3);
            border-radius:6px; padding:4px 7px; display:none;
            font-variant-numeric:tabular-nums; letter-spacing:0.05em; white-space:nowrap;
        }
        .rec-timer.visible { display:block; }

        /* ── VIDEO WRAPPER ── */
        .video-wrapper {
            position:relative; background:#000; overflow:hidden;
            flex:1; display:flex; align-items:center; justify-content:center;
        }
        #videoPlayer { width:100%; height:100%; object-fit:contain; background:#000; }
        #iframePlayer { width:100%; height:100%; border:none; display:none; }

        /* ── REC INDICATOR ── */
        .rec-indicator {
            position:absolute; top:12px; left:12px; z-index:20;
            display:none; align-items:center; gap:6px;
            background:rgba(0,0,0,0.7); border-radius:8px; padding:5px 10px;
            font-size:0.78rem; font-weight:700; color:#fff;
        }
        .rec-indicator.visible { display:flex; }
        .rec-dot { width:9px; height:9px; background:var(--rec-red); border-radius:50%; animation:blink 1s step-start infinite; flex-shrink:0; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── ZAP ZONES ── */
        .zap-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            pointer-events:none; display:flex; justify-content:space-between; align-items:center; z-index:10;
        }
        .zap-zone {
            width:18%; height:65%; pointer-events:auto; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            opacity:0; transition:0.3s; border-radius:12px;
        }
        .zap-zone:hover, .zap-zone:active { opacity:1; background:linear-gradient(90deg,rgba(0,0,0,0.55),transparent); }
        .zap-zone.next:hover, .zap-zone.next:active { background:linear-gradient(-90deg,rgba(0,0,0,0.55),transparent); }
        .zap-zone svg { width:44px; height:44px; fill:white; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }

        /* ── LOADER ── */
        .loader { position:absolute; inset:0; background:rgba(0,0,0,0.75); display:flex; justify-content:center; align-items:center; z-index:5; opacity:0; pointer-events:none; transition:0.3s; }
        .loader.active { opacity:1; }
        .spinner { width:46px; height:46px; border:3.5px solid rgba(255,255,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── TOAST ── */
        .toast {
            position:fixed; bottom:calc(1.5rem + var(--safe-bottom)); left:50%;
            transform:translateX(-50%) translateY(20px);
            z-index:9999; background:var(--bg-tertiary); border:1px solid var(--border);
            border-radius:12px; padding:0.75rem 1.2rem; font-size:0.88rem;
            pointer-events:none; opacity:0; transition:all 0.3s;
            white-space:nowrap; max-width:90vw; text-align:center;
        }
        .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

        /* ═══════════════════════════════════════
           MOBILE HEADER (≤ 600px)
        ═══════════════════════════════════════ */
        .mobile-header {
            display:none;
            flex-direction:column;
            background:var(--bg-tertiary);
            border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        .mh-top {
            display:flex; align-items:center; justify-content:space-between;
            padding:0.6rem 0.9rem;
            gap:0.5rem;
        }
        .mh-info { display:flex; align-items:center; gap:0.6rem; min-width:0; flex:1; }
        .mh-logo { height:22px; flex-shrink:0; }
        .mh-title { font-size:0.9rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mh-cat { font-size:0.68rem; color:var(--text-secondary); }
        .mh-clock { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; }
        .mh-clock-time { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; letter-spacing:0.06em; font-variant-numeric:tabular-nums; line-height:1; }
        .mh-clock-date { font-size:0.58rem; color:var(--text-secondary); letter-spacing:0.03em; text-transform:capitalize; }

        .mh-controls {
            display:flex; align-items:center; gap:0.4rem;
            padding:0 0.9rem 0.6rem;
            overflow-x:auto; -webkit-overflow-scrolling:touch;
            scrollbar-width:none;
        }
        .mh-controls::-webkit-scrollbar { display:none; }
        .mh-rec-timer {
            font-size:0.7rem; font-weight:700; color:var(--rec-red);
            background:rgba(255,59,59,0.12); border:1px solid rgba(255,59,59,0.3);
            border-radius:6px; padding:3px 6px; display:none;
            font-variant-numeric:tabular-nums; white-space:nowrap; flex-shrink:0;
        }
        .mh-rec-timer.visible { display:block; }

        /* ═══════════════════════════════════════
           BREAKPOINTS
        ═══════════════════════════════════════ */
        @media (max-width:900px) {
            .player-header { padding:0.6rem 1rem; }
            .clock-display { min-width:95px; padding:0 0.7rem; }
        }

        /* Mobile portrait ≤ 600px */
        @media (max-width:600px) {
            .sidebar-toggle { width:38px; height:80px; }
            .sidebar-toggle.open { left:85vw; }

            .player-header { display:none; }
            .mobile-header { display:flex; }

            /* Vidéo en 16:9 fixe, le reste de l'espace est libre */
            .video-wrapper { flex:none; width:100%; aspect-ratio:16/9; }
            .player-frame { overflow-y:auto; -webkit-overflow-scrolling:touch; }
        }

        /* Très petits écrans ≤ 360px */
        @media (max-width:360px) {
            .mh-title { font-size:0.82rem; }
            .mh-clock-time { font-size:0.9rem; }
            .ctrl-btn, .rec-btn { width:34px; height:34px; }
            .ctrl-btn svg, .rec-btn svg { width:16px; height:16px; }
        }

        /* Paysage mobile (hauteur réduite) */
        @media (max-height:500px) and (orientation:landscape) {
            .mobile-header { flex-direction:row; align-items:center; padding:0 0.8rem; min-height:44px; }
            .mh-top { padding:0; flex:1; }
            .mh-controls { padding:0 0 0 0.5rem; }
            .video-wrapper { flex:1; aspect-ratio:unset; }
        }

        /* Desktop hover */
        @media (hover:hover) {
            .channel-card:hover { transform:translateX(4px); border-color:var(--accent); background:var(--bg-tertiary); }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="Menu chaînes">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
</button>

<!-- ═══════ SIDEBAR ═══════ -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-title" onclick="unlockSecret()">TeslaTV</div>
        <div class="mode-switcher">
            <button class="mode-btn active" onclick="switchMode('tv')">TV</button>
            <button class="mode-btn" onclick="switchMode('series')">Séries</button>
            <button id="xxxBtn" class="mode-btn" style="display:none;color:#ff0040" onclick="switchMode('xxx')">18+</button>
        </div>
    </div>
    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" placeholder="Rechercher une chaîne..."
               autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="channels-grid" id="grid"></div>
</div>

<!-- ═══════ MAIN ═══════ -->
<div class="main-content" id="mainContent">
    <div class="player-frame" id="playerContainer">

        <!-- Header DESKTOP -->
        <div class="player-header">
            <div class="header-info">
                <img src="" id="currentLogo" style="display:none" onerror="this.style.display='none'">
                <div class="header-info-text">
                    <div class="header-title" id="currentTitle">Bienvenue</div>
                    <div class="header-cat" id="currentCat">Sélectionnez un contenu</div>
                </div>
            </div>
            <div class="clock-display">
                <div class="clock-time" id="clockTime">00:00</div>
                <div class="clock-date" id="clockDate">—</div>
            </div>
            <div class="header-controls">
                <button class="ctrl-btn" onclick="toggleFav()" title="Favoris">
                    <svg id="favIcon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="togglePiP()" title="PiP">
                    <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="toggleFullscreen()" title="Plein Écran">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="toggleCast()" title="Caster">
                    <svg viewBox="0 0 24 24"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                </button>
                <span class="rec-timer" id="recTimer">00:00</span>
                <button class="rec-btn" id="recBtn" onclick="toggleRecord()" title="Enregistrer">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                </button>
            </div>
        </div>

        <!-- Header MOBILE (≤600px) -->
        <div class="mobile-header" id="mobileHeader">
            <div class="mh-top">
                <div class="mh-info">
                    <img src="" id="mCurrentLogo" class="mh-logo" style="display:none" onerror="this.style.display='none'">
                    <div>
                        <div class="mh-title" id="mCurrentTitle">Bienvenue</div>
                        <div class="mh-cat" id="mCurrentCat">Sélectionnez un contenu</div>
                    </div>
                </div>
                <div class="mh-clock">
                    <div class="mh-clock-time" id="mClockTime">00:00</div>
                    <div class="mh-clock-date" id="mClockDate">—</div>
                </div>
            </div>
            <div class="mh-controls">
                <button class="ctrl-btn" onclick="toggleFav()" title="Favoris">
                    <svg id="mFavIcon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="togglePiP()" title="PiP">
                    <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="toggleFullscreen()" title="Plein Écran">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button class="ctrl-btn" onclick="toggleCast()" title="Caster">
                    <svg viewBox="0 0 24 24"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                </button>
                <span class="mh-rec-timer" id="mRecTimer">00:00</span>
                <button class="rec-btn" id="mRecBtn" onclick="toggleRecord()" title="Enregistrer">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                </button>
            </div>
        </div>

        <!-- VIDEO -->
        <div class="video-wrapper">
            <div class="rec-indicator" id="recIndicator">
                <div class="rec-dot"></div>
                <span id="recOverlayTime">00:00</span>
                REC
            </div>
            <div class="zap-overlay">
                <div class="zap-zone prev" onclick="zap(-1)">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </div>
                <div class="zap-zone next" onclick="zap(1)">
                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </div>
            </div>
            <div class="loader" id="loader"><div class="spinner"></div></div>
            <video id="videoPlayer" controls autoplay playsinline></video>
            <iframe id="iframePlayer" allowfullscreen allow="autoplay;encrypted-media"></iframe>
        </div>

    </div>
</div>

<script>
const GISTS = {
    tv:     'https://gist.githubusercontent.com/mikefri/0802a5afa97ac99a27cec4e6c1737a95/raw/channels.json',
    series: 'https://gist.githubusercontent.com/mikefri/fc75ba4ad4eb3d8da1a3d1f6dc9c83f2/raw/series.json',
    xxx:    'https://gist.githubusercontent.com/mikefri/c4ea8003ac647eeafd14c35db59431ea/raw/xx.json'
};

let state = {
    mode: localStorage.getItem('mode') || 'tv',
    list: [], current: null,
    favs: JSON.parse(localStorage.getItem('favs') || '[]'),
    focusIdx: -1
};
let hls = null, dash = null;

const $ = id => document.getElementById(id);
const isMobile = () => 'ontouchstart' in window;

/* ── HORLOGE ── */
function updateClock() {
    const now = new Date();
    const h   = now.getHours().toString().padStart(2,'0');
    const m   = now.getMinutes().toString().padStart(2,'0');
    const sep = now.getSeconds()%2===0 ? ':' : '<span style="opacity:.3">:</span>';
    const html = `${h}${sep}${m}`;

    $('clockTime').innerHTML  = html;
    $('mClockTime').innerHTML = html;

    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const mois  = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
    const dateStr = `${jours[now.getDay()]} ${now.getDate()} ${mois[now.getMonth()]}`;
    $('clockDate').textContent  = `${dateStr} ${now.getFullYear()}`;
    $('mClockDate').textContent = dateStr;
}
updateClock();
setInterval(updateClock, 1000);

/* ── ENREGISTREMENT ── */
let mediaRecorder=null, recChunks=[], recInterval=null, recSeconds=0;

function toggleRecord() {
    if (mediaRecorder && mediaRecorder.state==='recording') stopRecord(); else startRecord();
}
function startRecord() {
    const video=$('videoPlayer');
    if (!video||video.style.display==='none') { toast('⚠️ Impossible sur iframe'); return; }
    if (!video.srcObject&&!video.src) { toast('⚠️ Lance une chaîne d\'abord'); return; }
    let stream;
    try { stream=video.captureStream?video.captureStream():video.mozCaptureStream(); }
    catch(e) { toast('⚠️ Capture non supportée'); return; }
    const mimeType=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4']
        .find(m=>MediaRecorder.isTypeSupported(m))||'';
    try { mediaRecorder=new MediaRecorder(stream,mimeType?{mimeType}:{}); }
    catch(e) { toast('⚠️ MediaRecorder non supporté'); return; }
    recChunks=[]; recSeconds=0;
    mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) recChunks.push(e.data); };
    mediaRecorder.onstop=saveRecord;
    mediaRecorder.start(1000);
    [$('recBtn'),$('mRecBtn')].forEach(b=>b&&b.classList.add('recording'));
    [$('recTimer'),$('mRecTimer')].forEach(t=>t&&t.classList.add('visible'));
    $('recIndicator').classList.add('visible');
    recInterval=setInterval(()=>{
        recSeconds++;
        const t=formatRecTime(recSeconds);
        [$('recTimer'),$('mRecTimer')].forEach(el=>{ if(el) el.textContent=t; });
        $('recOverlayTime').textContent=t;
    },1000);
    toast('⏺ Enregistrement démarré');
}
function stopRecord() {
    if(!mediaRecorder) return;
    mediaRecorder.stop(); clearInterval(recInterval);
    [$('recBtn'),$('mRecBtn')].forEach(b=>b&&b.classList.remove('recording'));
    [$('recTimer'),$('mRecTimer')].forEach(t=>{ if(t){ t.classList.remove('visible'); t.textContent='00:00'; } });
    $('recIndicator').classList.remove('visible');
    toast('⏹ Terminé — téléchargement...');
}
function saveRecord() {
    if(!recChunks.length) return;
    const blob=new Blob(recChunks,{type:recChunks[0].type||'video/webm'});
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    const name=(state.current?.name||'TeslaTV').replace(/[^a-z0-9]/gi,'_');
    const date=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.href=url; a.download=`${name}_${date}.webm`; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),10000); recChunks=[];
}
function formatRecTime(s) {
    return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

/* ── PROXY ── */
function urlFor(url) {
    if(url.endsWith('.mpd')||(url.includes('.m3u8')&&url.includes('netplus.ch')))
        return '/api/proxy?url='+encodeURIComponent(url);
    return url;
}

const video  = $('videoPlayer');
const iframe = $('iframePlayer');
const loader = $('loader');
const grid   = $('grid');
const search = $('searchInput');
const sidebar= $('sidebar');

/* ── INIT ── */
function init() {
    switchMode(state.mode);
    search.addEventListener('input', render);
    document.addEventListener('keydown', handleKeys);
    video.addEventListener('waiting', ()=>loader.classList.add('active'));
    video.addEventListener('playing', ()=>loader.classList.remove('active'));
    if(window.innerWidth>1000) toggleSidebar();
}

/* ── CLAVIER ── */
function handleKeys(e) {
    const open=sidebar.classList.contains('open');
    if(e.key==='m'||e.key==='M') toggleSidebar();
    if(e.key==='f'||e.key==='F') toggleFullscreen();
    if(open){
        const cards=document.querySelectorAll('.channel-card');
        if(e.key==='ArrowDown'){e.preventDefault();state.focusIdx=Math.min(state.focusIdx+1,cards.length-1);focusCard(cards);}
        else if(e.key==='ArrowUp'){e.preventDefault();state.focusIdx=Math.max(state.focusIdx-1,0);focusCard(cards);}
        else if(e.key==='Enter'&&state.focusIdx>=0) cards[state.focusIdx].click();
        else if(e.key==='ArrowRight'||e.key==='Escape') toggleSidebar();
    } else {
        if(e.key==='ArrowRight') zap(1);
        else if(e.key==='ArrowLeft') zap(-1);
        else if(e.key==='Enter'||e.key==='ArrowUp') toggleSidebar();
    }
}
function focusCard(cards) {
    cards.forEach(c=>c.classList.remove('focused'));
    if(cards[state.focusIdx]){cards[state.focusIdx].classList.add('focused');cards[state.focusIdx].scrollIntoView({block:'center'});}
}

/* ── ZAPPING ── */
function zap(dir) {
    if(!state.current) return toggleSidebar();
    const list=filtered(); if(!list.length) return;
    const idx=list.findIndex(c=>c.id===state.current.id);
    play(list[(idx+dir+list.length)%list.length].id);
}
function filtered() {
    const t=search.value.toLowerCase();
    return state.list.filter(i=>i.name.toLowerCase().includes(t));
}

/* ── MODE / RENDER ── */
async function switchMode(mode) {
    state.mode=mode; state.focusIdx=-1;
    localStorage.setItem('mode',mode);
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`.mode-btn[onclick="switchMode('${mode}')"]`)?.classList.add('active');
    grid.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-secondary)">Chargement...</div>';
    try {
        const r=await fetch(GISTS[mode]+'?t='+Date.now());
        state.list=await r.json(); render();
    } catch { grid.innerHTML='<div style="color:#f44;text-align:center;padding:20px">Erreur chargement</div>'; }
}

function render() {
    const list=filtered().sort((a,b)=>{
        const af=state.favs.includes(a.id),bf=state.favs.includes(b.id);
        return af===bf?0:af?-1:1;
    });
    grid.innerHTML=list.map(item=>`
        <div class="channel-card ${state.current?.id===item.id?'active':''}" onclick="play(${item.id})">
            <img src="${item.logo||''}" class="channel-logo" loading="lazy" onerror="this.style.opacity=0">
            <div style="flex:1;min-width:0">
                <div class="channel-name">${item.name}</div>
                <div class="channel-cat">${item.category||''}</div>
            </div>
            ${state.favs.includes(item.id)?'<span style="color:var(--fav-gold);flex-shrink:0">★</span>':''}
        </div>`).join('');
}

/* ── LECTURE ── */
function play(id) {
    const item=state.list.find(i=>i.id===id); if(!item) return;
    state.current=item; render();

    // Desktop header
    $('currentTitle').textContent=item.name;
    $('currentCat').textContent=item.category||'';
    const logo=$('currentLogo');
    logo.src=item.logo||''; logo.style.display=item.logo?'block':'none';

    // Mobile header
    $('mCurrentTitle').textContent=item.name;
    $('mCurrentCat').textContent=item.category||'';
    const mLogo=$('mCurrentLogo');
    mLogo.src=item.logo||''; mLogo.style.display=item.logo?'block':'none';

    updateFavIcon();
    if(mediaRecorder&&mediaRecorder.state==='recording') stopRecord();
    if(hls){hls.destroy();hls=null;}
    if(dash){dash.reset();dash=null;}
    video.pause(); video.removeAttribute('src');
    video.style.display='none';
    iframe.style.display='none'; iframe.src='';
    loader.classList.add('active');

    const url=item.url;
    const isStream=/\.(m3u8|mpd|mp4)(\?.*)?$/i.test(url);

    if(!isStream){
        iframe.src=url.includes('mega.nz')?url.replace('/file/','/embed/'):url;
        iframe.style.display='block';
        loader.classList.remove('active');
    } else if(url.endsWith('.mpd')){
        video.style.display='block';
        dash=dashjs.MediaPlayer().create();
        dash.initialize(video,urlFor(url),true);
        dash.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED,()=>loader.classList.remove('active'));
        dash.on(dashjs.MediaPlayer.events.ERROR,()=>loader.classList.remove('active'));
    } else {
        video.style.display='block';
        if(Hls.isSupported()){
            hls=new Hls();
            hls.loadSource(urlFor(url));
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
        } else {
            video.src=url; video.play().catch(()=>{});
        }
    }

    if(window.innerWidth<1000) toggleSidebar();
}

/* ── OUTILS ── */
function toggleSidebar() {
    sidebar.classList.toggle('open');
    $('sidebarToggle').classList.toggle('open');
    $('mainContent').classList.toggle('shifted');
    if(sidebar.classList.contains('open')){
        state.focusIdx=-1;
        if(!isMobile()) search.focus();
    }
}
function toggleFullscreen() {
    if(!document.fullscreenElement) $('playerContainer').requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
}
function toggleFav() {
    if(!state.current) return;
    const id=state.current.id, was=state.favs.includes(id);
    state.favs=was?state.favs.filter(f=>f!==id):[...state.favs,id];
    localStorage.setItem('favs',JSON.stringify(state.favs));
    render(); updateFavIcon();
    toast(was?'💔 Retiré des favoris':'⭐ Ajouté aux favoris');
}
function updateFavIcon() {
    const active=state.current&&state.favs.includes(state.current.id);
    $('favIcon').style.fill  = active?'var(--fav-gold)':'currentColor';
    $('mFavIcon').style.fill = active?'var(--fav-gold)':'currentColor';
}
function togglePiP() {
    if(document.pictureInPictureElement) document.exitPictureInPicture();
    else if(video.readyState>=2) video.requestPictureInPicture().catch(()=>{});
}
function toast(msg,ms=2500) {
    const t=$('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),ms);
}
let sc=0;
function unlockSecret() {
    sc++;
    if(sc===5){$('xxxBtn').style.display='block';toast('🔞 Mode débloqué');}
    setTimeout(()=>sc=0,2000);
}
function toggleCast() {
    try{cast.framework.CastContext.getInstance().requestSession();}catch{toast('Cast non disponible');}
}
window['__onGCastApiAvailable']=ok=>{
    if(ok) cast.framework.CastContext.getInstance().setOptions({receiverApplicationId:chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID});
};

init();
</script>
</body>
</html>
